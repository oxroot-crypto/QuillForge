<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Quill pen, tilted ~30 degrees, filling most of the canvas -->
  <g transform="translate(512,512) rotate(-30) scale(1.4)">
    <!-- Shaft -->
    <path d="M-16,-350 L-16,290 L16,290 L16,-350 Z" fill="#6366f1"/>

    <!-- Left barbs -->
    <line x1="-16" y1="-330" x2="-120" y2="-250" stroke="#6366f1" stroke-width="20" stroke-linecap="round"/>
    <line x1="-16" y1="-280" x2="-132" y2="-185" stroke="#6366f1" stroke-width="16" stroke-linecap="round"/>
    <line x1="-16" y1="-230" x2="-128" y2="-120" stroke="#818cf8" stroke-width="13" stroke-linecap="round"/>
    <line x1="-16" y1="-180" x2="-110" y2="-65" stroke="#818cf8" stroke-width="10" stroke-linecap="round"/>
    <line x1="-16" y1="-130" x2="-82" y2="-25" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round"/>

    <!-- Right barbs -->
    <line x1="16" y1="-330" x2="120" y2="-250" stroke="#6366f1" stroke-width="20" stroke-linecap="round"/>
    <line x1="16" y1="-280" x2="132" y2="-185" stroke="#6366f1" stroke-width="16" stroke-linecap="round"/>
    <line x1="16" y1="-230" x2="128" y2="-120" stroke="#818cf8" stroke-width="13" stroke-linecap="round"/>
    <line x1="16" y1="-180" x2="110" y2="-65" stroke="#818cf8" stroke-width="10" stroke-linecap="round"/>
    <line x1="16" y1="-130" x2="82" y2="-25" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round"/>

    <!-- Nib -->
    <polygon points="-16,290 16,290 0,370" fill="#4f46e5"/>
    <line x1="0" y1="320" x2="0" y2="367" stroke="#fff" stroke-width="3" opacity="0.6"/>

    <!-- Ink drop -->
    <circle cx="0" cy="410" r="14" fill="#4f46e5" opacity="0.35"/>
  </g>
</svg>
